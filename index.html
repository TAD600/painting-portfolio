<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tahia Anan Dhira | Painting Portfolio</title>

    <meta name="description"
          content="Painting portfolio of Tahia Anan Dhira featuring acrylic, gouache, watercolor, pencil, and digital artworks inspired by memory, music, travel, and everyday life.">

    <meta name="author"
          content="Tahia Anan Dhira">

    <!-- Open Graph -->
    <meta property="og:title"
          content="Tahia Anan Dhira | Painting Portfolio">

    <meta property="og:description"
          content="A collection of paintings by Tahia Anan Dhira.">

    <meta property="og:type"
          content="website">

    <meta property="og:url"
          content="https://art.tahiaanandhira.com/">

    <meta property="og:image"
          content="https://art.tahiaanandhira.com/paintings/p2023_2.jpg">

    <!-- Google Fonts -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@300;400;500&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- =====================================================
         TOP BAR
    ====================================================== -->

    <header class="topbar">

        <h1 class="name">

            <a href="index.html">
                Tahia Anan Dhira
            </a>

        </h1>

        <div class="links">

            <!-- Email -->
            <a href="mailto:dhiraanan3@gmail.com"
               title="Email">

                <i class="bi bi-envelope-fill"></i>

            </a>

            <!-- Academic Website -->
            <a href="https://tahiaanandhira.com"
               target="_blank"
               title="Academic Website">

                <i class="bi bi-mortarboard-fill"></i>

            </a>

        </div>

    </header>

    <!-- =====================================================
         GALLERY
    ====================================================== -->

    <main id="gallery">

        <!-- Paintings will be inserted here automatically -->

    </main>

    <!-- =====================================================
         FULLSCREEN VIEWER
    ====================================================== -->

    <div id="viewer" class="viewer hidden">

        <span id="close" class="close">

            &times;

        </span>

        <div class="viewer-content">

            <div class="viewer-image-container">

                <img
                    id="viewer-image"
                    src=""
                    alt="Painting">

            </div>

            <div class="viewer-text">

                <h2 id="viewer-title"></h2>

                <p class="meta">

                    <span id="viewer-year"></span>

                    •

                    <span id="viewer-medium"></span>

                </p>

                <p id="viewer-caption"></p>

            </div>

        </div>

    </div>

    <!-- =====================================================
         JAVASCRIPT
    ====================================================== -->

    <script src="gallery.js"></script>

</body>

</html>
